<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Tareas</title>

<style>
body {
  font-family: Arial;
  background: #0f2027;
  color: white;
  text-align: center;
}

.contenedor {
  margin-top: 50px;
}

input {
  padding: 10px;
  width: 200px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  margin-left: 5px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #203a43;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
}

.eliminar {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="contenedor">
  <h2>Lista de Tareas 📝</h2>

  <input type="text" id="tarea" placeholder="Escribe una tarea">
  <button onclick="agregar()">Agregar</button>

  <ul id="lista"></ul>
</div>

<script>
function agregar() {
  let tarea = document.getElementById("tarea").value;

  if (tarea === "") return;

  let li = document.createElement("li");
  li.innerHTML = tarea + ' <button class="eliminar" onclick="this.parentElement.remove()">X</button>';

  document.getElementById("lista").appendChild(li);

  document.getElementById("tarea").value = "";
}
</script>

</body>
</html>
