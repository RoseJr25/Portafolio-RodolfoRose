<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

.calculadora {
  background: #2c2c3e;
  padding: 20px;
  border-radius: 10px;
  display: inline-block;
  margin-top: 50px;
}

input {
  width: 80px;
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #444;
  color: white;
}

.resultado {
  margin-top: 15px;
  font-size: 20px;
}
</style>

</head>
<body>

<div class="calculadora">
  <h2>Calculadora 💻</h2>

  <input type="number" id="num1" placeholder="Número 1">
  <input type="number" id="num2" placeholder="Número 2">

  <div>
    <button onclick="operar('+')">+</button>
    <button onclick="operar('-')">-</button>
    <button onclick="operar('*')">*</button>
    <button onclick="operar('/')">/</button>
  </div>

  <p class="resultado" id="resultado"></p>
</div>

<script>
function operar(op) {
let n1 = parseFloat(document.getElementById("num1").value) || 0;
let n2 = parseFloat(document.getElementById("num2").value) || 0;

  if (isNaN(n1) || isNaN(n2)) {
    document.getElementById("resultado").innerText = "Ingresa números";
    return;
  }

  let res;

  switch(op) {
    case '+':
      res = n1 + n2;
      break;
    case '-':
      res = n1 - n2;
      break;
    case '*':
      res = n1 * n2;
      break;
    case '/':
      res = n2 !== 0 ? n1 / n2 : "No dividir entre 0";
      break;
  }

  document.getElementById("resultado").innerText = res;
}
</script>

</body>
</html>
